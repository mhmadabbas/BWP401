<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اتصل بنا - دليل فعاليات SVU</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="d-flex flex-column min-vh-100">
    <header>
<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
            <div class="container">
                <a class="navbar-brand fw-bold d-flex align-items-center" href="index.html">
                    <img src="assets/img/logo.png" alt="شعار" width="40" height="40" class="me-2 bg-white rounded p-1">
                    دليل فعاليات SVU
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto">
                        <li class="nav-item"><a class="nav-link active" href="index.html">الرئيسية</a></li>
                        <li class="nav-item"><a class="nav-link" href="events.html">كل الفعاليات</a></li>
                        <li class="nav-item"><a class="nav-link" href="about.html">عن الدليل</a></li>
                        <li class="nav-item"><a class="nav-link" href="contact.html">اتصل بنا</a></li>
                    </ul>
                    
                    <button id="themeToggle" class="btn btn-outline-light ms-lg-3 mt-3 mt-lg-0 rounded-circle" aria-label="تبديل الوضع الليلي">
                        <i class="bi bi-moon-stars"></i>
                    </button>
                    </div>
            </div>
        </nav>
    </header>

    <main class="container my-5 flex-grow-1">
        <h2 class="text-center mb-4"><i class="bi bi-envelope-paper"></i> اتصل بنا</h2>
        <div class="row justify-content-center">
            <div class="col-md-6 bg-white p-4 shadow rounded">
                <div id="alertMessage"></div>
                <form id="contactForm">
                    <div class="mb-3">
                        <label class="form-label">الاسم الكامل</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">البريد الإلكتروني</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-at"></i></span>
                            <input type="email" class="form-control" id="email" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">الرسالة</label>
                        <textarea class="form-control" id="message" rows="4" required></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100"><i class="bi bi-send"></i> إرسال</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="text-center py-3 bg-dark text-white mt-auto">
        <div class="container">
            <p class="mb-1">جميع الحقوق محفوظة © 2026 دليل فعاليات SVU</p>
        </div>
    </footer>
    <button id="backToTop" class="btn btn-primary">
    <i class="bi bi-arrow-up"></i>
</button>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
